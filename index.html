                        </div>
                    `).join('')}
                </div>
            `;

            sound.playDramaticBoom();

            setTimeout(() => {
                const speaker = document.getElementById('finale-speaker');
                const darkness = document.getElementById('finale-darkness');
                if (darkness) darkness.style.opacity = '0.75';
                if (speaker) speaker.innerHTML = `🔥 <b class="text-yellow-400">CHRIS:</b> "The winner of Total Drama is..."`;
                
                const heartbeats = document.querySelectorAll('.finale-heartbeat');
                const spotlights = document.querySelectorAll('.finale-spotlight');
                
                heartbeats.forEach(el => el.classList.add('heartbeat-active', 'border-yellow-500'));
                spotlights.forEach(el => el.classList.replace('bg-yellow-500/0', 'bg-yellow-500/20'));

                let beatCount = 0;
                state.player.activeHeartbeat = setInterval(() => {
                    sound.playHeartbeat();
                    beatCount++;
                    if (beatCount >= 5) {
                        clearInterval(state.player.activeHeartbeat);
                        setTimeout(() => {
                            playerNext();
                        }, 1000);
                    }
                }, 800);

            }, 3000);
        }

        function startAutoCeremony() {
            if (state.player.ceremonyTimer) clearInterval(state.player.ceremonyTimer);
            nextCeremonyStep();
            state.player.ceremonyTimer = setInterval(() => {
                nextCeremonyStep();
            }, 3000);
        }

        function nextCeremonyStep() {
            const slide = state.player.slides[state.player.currentIndex];
            const ep = slide.data;

            if (state.player.ceremonyStep >= ep.safeOrder.length + 1) {
                if (state.player.ceremonyTimer) clearInterval(state.player.ceremonyTimer);
                playerNext();
                return;
            }

            if (state.player.ceremonyStep < ep.safeOrder.length) {
                const remainingToSave = ep.safeOrder.length - state.player.ceremonyStep;
                
                if (remainingToSave === 1) {
                    triggerBottomTwoDrama(ep);
                    return;
                }

                const safeId = ep.safeOrder[state.player.ceremonyStep];
                deliverMarshmallow(safeId, `Chris: "The next marshmallow goes to... ${getChar(safeId).name}!"`);
                state.player.ceremonyStep++;
            } else {
                triggerEliminationDrama(ep);
                state.player.ceremonyStep++;
            }
        }

        function deliverMarshmallow(id, message) {
            const speaker = document.getElementById('ceremony-speaker');
            const contender = document.getElementById(`play-camp-${id}`);
            const img = document.getElementById(`play-img-${id}`);
            const mmBadge = document.getElementById(`marshmallow-badge-${id}`);
            const savedBadge = document.getElementById(`badge-saved-${id}`);
            
            if (speaker) speaker.innerText = message;
            
            sound.playSparkle();
            
            if (contender) {
                contender.classList.remove('bg-gray-900/40', 'border-gray-800');
                contender.classList.add('bg-green-950/20', 'border-green-500', 'scale-100');
            }
            if (img) {
                img.classList.remove('border-gray-600');
                img.classList.add('border-green-500', 'shadow-[0_0_15px_rgba(34,197,94,0.5)]');
            }
            if (mmBadge) mmBadge.classList.remove('hidden');
            if (savedBadge) savedBadge.classList.remove('hidden');
            
            state.player.savedList.push(id);
        }

        function triggerBottomTwoDrama(ep) {
            if (state.player.ceremonyTimer) clearInterval(state.player.ceremonyTimer);

            const speaker = document.getElementById('ceremony-speaker');
            const darkness = document.getElementById('ceremony-darkness');

            const lastSafeId = ep.safeOrder[ep.safeOrder.length - 1];
            const elimId = ep.eliminatedId;
            const bottomTwo = [lastSafeId, elimId];

            if (speaker) speaker.innerHTML = `⚠️ <b class="text-red-400">CHRIS:</b> "Only one marshmallow remains on this plate... ${getChar(lastSafeId).name}, ${getChar(elimId).name}. One of you will be safe, the other will be going home!"`;

            if (darkness) darkness.style.opacity = '0.75';

            state.player.savedList.forEach(id => {
                const item = document.getElementById(`play-camp-${id}`);
                if(item) item.classList.add('opacity-30', 'scale-90');
            });

            bottomTwo.forEach(id => {
                const item = document.getElementById(`play-camp-${id}`);
                const img = document.getElementById(`play-img-${id}`);
                const spotlight = document.getElementById(`spotlight-${id}`);
                
                if (item) item.classList.add('scale-105', 'z-30');
                if (img) img.classList.add('heartbeat-active');
                if (spotlight) spotlight.classList.replace('bg-yellow-400/0', 'bg-red-500/20');
            });

            let heartbeatCounter = 0;
            state.player.activeHeartbeat = setInterval(() => {
                sound.playHeartbeat();
                heartbeatCounter++;
                if (heartbeatCounter >= 4) {
                    clearInterval(state.player.activeHeartbeat);
                    
                    setTimeout(() => {
                        deliverMarshmallow(lastSafeId, `Chris: "And the last marshmallow goes to... ${getChar(lastSafeId).name}!"`);
                        
                        const lastSafeImg = document.getElementById(`play-img-${lastSafeId}`);
                        if(lastSafeImg) lastSafeImg.classList.remove('heartbeat-active');
                        
                        state.player.ceremonyStep = ep.safeOrder.length;
                        
                        setTimeout(() => {
                            nextCeremonyStep();
                        }, 2500);
                        
                    }, 1000);
                }
            }, 800);
        }

        function triggerEliminationDrama(ep) {
            const elimId = ep.eliminatedId;
            const contender = document.getElementById(`play-camp-${elimId}`);
            const img = document.getElementById(`play-img-${elimId}`);
            const speaker = document.getElementById('ceremony-speaker');

            if (img) img.classList.remove('heartbeat-active');

            if (contender) {
                contender.classList.remove('bg-gray-900/40', 'border-gray-800');
                contender.classList.add('border-red-600', 'bg-red-950/40', 'z-30', 'scale-105');
                
                const stamp = document.createElement('div');
                stamp.className = "stamp-x";
                stamp.innerText = "❌";
                contender.appendChild(stamp);
            }

            if (img) {
                img.classList.remove('border-gray-600');
                img.classList.add('border-red-600', 'shadow-[0_0_20px_rgba(220,38,38,0.7)]', 'filter', 'grayscale');
            }

            if (speaker) speaker.innerHTML = `☠️ <b class="text-red-500">CHRIS:</b> "${getChar(elimId).name}, your fate is sealed! It's time to leave the island via the Dock of Shame!"`;
        }

        // --- STREAMING_CHUNK: Setting up final season standings layout... ---
        function renderStandings() {
            header.classList.remove('hidden');
            body.style.backgroundImage = 'none';
            body.style.backgroundColor = '#020617';
            
            const winner = state.characters.find(c => c.status === 'active');
            if (winner) winner.placement = 1;

            const sortedChars = [...state.characters].sort((a, b) => {
                if (a.placement === null) return 1;
                if (b.placement === null) return -1;
                return a.placement - b.placement;
            });

            app.innerHTML = `
                <div class="bg-gray-900 border-4 border-yellow-500/80 p-4 md:p-8 rounded-3xl shadow-2xl max-w-6xl w-full fade-in relative overflow-hidden flex flex-col h-[90vh]">
                    <div class="absolute inset-0 overflow-hidden pointer-events-none rounded-2xl z-0" id="confetti-container"></div>

                    <h1 class="text-3xl md:text-5xl td-font text-center text-yellow-400 mb-1 relative z-10 drop-shadow-lg shrink-0">🏆 FINAL STANDINGS 🏆</h1>
                    <h2 class="text-xl md:text-2xl text-white font-bold text-center mb-4 md:mb-6 relative z-10 uppercase tracking-widest">${state.config.seasonTitle}</h2>
                    
                    <div class="flex flex-wrap flex-row-reverse justify-center content-center gap-3 md:gap-4 flex-grow relative z-10 w-full overflow-y-auto custom-scroll max-h-[60vh] pb-6">
                        ${sortedChars.map((c, index) => {
                            const isWinner = c.placement === 1;
                            const placementText = c.placement ? `${c.placement}°` : 'N/A';
                            
                            const bgStyle = isWinner 
                                ? 'bg-gradient-to-t from-yellow-500/20 to-amber-500/20 border-yellow-500 border-2 shadow-[0_0_20px_rgba(234,179,8,0.3)] scale-110 z-20' 
                                : 'bg-gray-950/80 border border-gray-800';
                                
                            const badgeBg = isWinner ? 'bg-yellow-500 text-black' : 'bg-gray-700 text-white';

                            return `
                                <div class="relative flex flex-col items-center justify-center p-2 md:p-3 rounded-2xl ${bgStyle} w-20 md:w-28 transition transform hover:scale-105">
                                    <div class="absolute -top-3 -right-2 w-7 h-7 md:w-8 md:h-8 flex items-center justify-center font-black text-[10px] md:text-xs rounded-full ${badgeBg} border-2 border-gray-900 z-30 shadow-md">
                                        ${placementText}
                                    </div>
                                    ${isWinner ? '<div class="absolute -top-6 md:-top-8 text-3xl md:text-5xl animate-bounce z-20">👑</div>' : ''}
                                    <img src="${c.img}" class="w-10 h-10 md:w-14 md:h-14 mb-1.5 md:mb-2 ${state.config.avatarShape} border-2 ${isWinner ? 'border-yellow-500' : 'border-gray-700'} relative z-10 bg-gray-900">
                                    <h3 class="text-[9px] md:text-xs font-bold text-center truncate w-full ${isWinner ? 'text-yellow-400 td-font tracking-wider text-[11px] md:text-sm' : 'text-gray-200'}">${c.name}</h3>
                                    ${c.teamId && getTeam(c.teamId) ? `<span class="text-[7px] md:text-[8px] px-1.5 py-0.5 rounded-full text-white font-bold inline-block mt-0.5 md:mt-1 truncate max-w-full" style="background-color:${getTeam(c.teamId).color}">${getTeam(c.teamId).name}</span>` : '<span class="text-[7px] md:text-[8px] bg-purple-950 text-purple-300 border border-purple-800 px-1.5 py-0.5 rounded-full font-bold inline-block mt-0.5 md:mt-1 truncate max-w-full">Merge / No Team</span>'}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="mt-4 md:mt-6 text-center relative z-10 flex justify-center gap-3 shrink-0">
                        <button onclick="changePhase('presentation')" class="bg-gray-800 hover:bg-gray-755 text-white px-4 md:px-8 py-2 md:py-3 rounded-2xl font-bold text-xs md:text-sm border border-gray-700">◀ REWATCH</button>
                        <button onclick="openSeasonManager()" class="bg-amber-800 hover:bg-amber-700 text-white px-4 md:px-8 py-2 md:py-3 rounded-2xl font-bold text-xs md:text-sm border border-amber-900 shadow flex items-center gap-1.5">💾 SAVE SEASON</button>
                        <button onclick="confirmResetState()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-4 md:px-8 py-2 md:py-3 rounded-2xl font-bold text-xs md:text-sm td-font tracking-widest shadow-lg">CREATE ANOTHER SHOW ➔</button>
                    </div>
                </div>
            `;
            
            if (winner) {
                createConfetti();
                sound.playSparkle();
            }
        }

        function createConfetti() {
            const container = document.getElementById('confetti-container');
            if(!container) return;
            const colors = ['#facc15', '#ef4444', '#3b82f6', '#10b981', '#a855f7'];
            for(let i = 0; i < 85; i++) {
                const conf = document.createElement('div');
                conf.className = 'absolute w-3 h-3 rounded-sm opacity-80';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + '%';
                conf.style.top = '-20px';
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                conf.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random() * 200 - 100}px, 100vh, 0) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2500 + 2000,
                    iterations: Infinity,
                    easing: 'linear',
                    delay: Math.random() * 2000
                });
                container.appendChild(conf);
            }
        }

        // --- HISTORICAL TEAM EDITOR SYSTEM ---
        function openEpisodeTeamEditor(epNum) {
            const ep = state.episodes.find(e => e.num === parseInt(epNum));
            if (!ep) return;

            if (!ep.teamSnapshot) {
                ep.teamSnapshot = state.characters.map(c => ({ id: c.id, teamId: c.teamId }));
            }

            const activeAtThisEp = state.characters.filter(c => {
                if (c.status === 'active') return true;
                const elimEpIdx = state.episodes.findIndex(e => e.eliminatedId === c.id || e.runnerUpId === c.id);
                return elimEpIdx !== -1 && (elimEpIdx + 1) >= epNum;
            });

            const teamOptionsHtml = (charId, currentTeamId) => {
                let options = `<option value="" ${!currentTeamId ? 'selected' : ''}>No Team / Disbanded</option>`;
                state.teams.forEach(t => {
                    options += `<option value="${t.id}" ${currentTeamId === t.id ? 'selected' : ''}>${t.name}</option>`;
                });
                return `
                    <select onchange="updateSnapshotTeam('${epNum}', '${charId}', this.value)" class="bg-gray-800 border border-gray-700 text-white text-xs rounded-xl p-2 focus:outline-none focus:border-purple-500 w-full mt-1.5 cursor-pointer">
                        ${options}
                    </select>
                `;
            };

            const charsListHtml = activeAtThisEp.map(c => {
                const teamId = getTeamIdAtEp(c, ep);
                const team = getTeam(teamId);
                const borderColor = team ? team.color : '#475569';
                return `
                    <div class="flex items-center gap-3 bg-gray-900/60 p-3 rounded-2xl border border-gray-800">
                        <img src="${c.img}" class="w-12 h-12 ${state.config.avatarShape} border-2" style="border-color: ${borderColor}">
                        <div class="flex-1 text-left min-w-0">
                            <span class="block text-xs font-bold text-gray-200 truncate">${c.name}</span>
                            ${teamOptionsHtml(c.id, teamId)}
                        </div>
                    </div>
                `;
            }).join('');

            showModal(`
                <h3 class="text-2xl font-black text-center text-purple-400 td-font mb-2">✏️ REFORM TEAMS (EPISODE ${epNum})</h3>
                <p class="text-gray-400 text-xs text-center mb-4 leading-relaxed max-w-sm mx-auto">
                    Adjust the team affiliations of the contestants who were active at the start of Episode ${epNum}.
                </p>
                <div class="grid grid-cols-2 gap-2 max-h-72 overflow-y-auto custom-scroll mb-4 pr-1">
                    ${charsListHtml}
                </div>
                <div class="flex gap-2">
                    <button onclick="hideModal(); renderCurrentSlide();" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-wider transition shadow-lg border-b-4 border-purple-800">
                        Apply Changes & Reload Slide
                    </button>
                </div>
            `);
        }

        function updateSnapshotTeam(epNum, charId, newTeamId) {
            const mainChar = state.characters.find(c => c.id === charId);
            if (mainChar) {
                mainChar.teamId = newTeamId || null;
            }

            state.episodes.forEach(ep => {
                if (!ep.teamSnapshot) {
                    ep.teamSnapshot = state.characters.map(c => ({ id: c.id, teamId: c.teamId }));
                }
                const snap = ep.teamSnapshot.find(s => s.id === charId);
                if (snap) {
                    snap.teamId = newTeamId || null;
                } else {
                    ep.teamSnapshot.push({ id: charId, teamId: newTeamId || null });
                }
            });
            saveState();
        }

        // Exposing modular scoped features to the window object to allow standard onclick events
        window.changePhase = changePhase;
        window.resumeSavedPhase = resumeSavedPhase;
        window.confirmResetState = confirmResetState;
        window.executeResetState = executeResetState;
        window.addTeam = addTeam;
        window.removeTeam = removeTeam;
        window.addCharacter = addCharacter;
        window.removeCharacter = removeCharacter;
        window.openTeamAssignModal = openTeamAssignModal;
        window.assignTeam = assignTeam;
        window.startVisualBuilder = startVisualBuilder;
        window.builderSetStep = builderSetStep;
        window.builderNextStep = builderNextStep;
        window.selectLosingTeam = selectLosingTeam;
        window.selectImmunity = selectImmunity;
        window.setFinaleType = setFinaleType;
        window.selectWinner = selectWinner;
        window.openFinaleVoteOverlay = openFinaleVoteOverlay;
        window.handleFinaleJuryNext = handleFinaleJuryNext;
        window.resolveFinaleTie = resolveFinaleTie;
        window.triggerMergeBuilder = triggerMergeBuilder;
        window.openVoteOverlay = openVoteOverlay;
        window.addVoteBuilder = addVoteBuilder;
        window.removeVoteBuilder = removeVoteBuilder;
        window.resolveTieBuilder = resolveTieBuilder;
        window.handleCeremonyClick = handleCeremonyClick;
        window.undoEliminatedBuilder = undoEliminatedBuilder;
        window.saveVisualEpisode = saveVisualEpisode;
        window.saveVisualFinale = saveVisualFinale;
        window.undoLastEpisode = undoLastEpisode;
        window.finishBuilding = finishBuilding;
        window.playerNext = playerNext;
        window.playerPrev = playerPrev;
        window.openEpisodeTeamEditor = openEpisodeTeamEditor;
        window.updateSnapshotTeam = updateSnapshotTeam;
        window.hideModal = hideModal;
        window.openSeasonManager = openSeasonManager;
        window.saveCurrentSeason = saveCurrentSeason;
        window.loadSeason = loadSeason;
        window.deleteSeason = deleteSeason;
        window.sound = sound;
        window.filterPresets = filterPresets;
        window.addPresetCharacter = addPresetCharacter;

        window.onload = async () => { 
            loadState();
            await initFirebase();
            render(); 
        };

        window.addEventListener('beforeunload', saveState);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') saveState();
        });
        autoSaveInterval = setInterval(saveState, 2000);
    </script>
</body>
</html>
