    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --td-green: #2d6a4f;
            --td-wood: #8b5a2b;
            --td-dark: #1b4332;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, .td-font {
            font-family: 'Bangers', cursive;
            letter-spacing: 2.5px;
        }
        .wood-panel {
            background-color: var(--td-wood);
            border: 4px solid #5c3a21;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.7);
            color: white;
        }
        
        /* Avatar Shapes */
        .avatar-circle { border-radius: 50%; }
        .avatar-square { border-radius: 0; }
        .avatar-rounded { border-radius: 20px; }
        .avatar-hexagon { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }

        /* Animations & Suspense */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Heartbeat Effect for bottom two */
        .heartbeat-active {
            animation: heartbeatAnim 0.6s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
            filter: drop-shadow(0 0 25px rgba(239, 68, 68, 0.9));
            border-color: #ef4444 !important;
        }
        @keyframes heartbeatAnim { 
            from { transform: scale(1.02); } 
            to { transform: scale(1.12); } 
        }

        /* Animated Marshmallow */
        .marshmallow-spin {
            animation: mmSpin 1s infinite alternate ease-in-out;
        }
        @keyframes mmSpin {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-8px) rotate(10deg); }
        }

        /* Elimination Stamp X */
        .stamp-x {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(5);
            opacity: 0;
            color: #ef4444;
            font-size: 7rem;
            font-weight: 900;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
            z-index: 40;
            pointer-events: none;
            animation: stampTrigger 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes stampTrigger {
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>

        // Native audio manager via Web Audio API
        class SoundSynth {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }
            playHeartbeat() {
                this.init();
                if (!this.ctx) return;
                
                const playBeat = (time) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(55, time); // Deep bass
                    gain.gain.setValueAtTime(0.8, time);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                    osc.start(time);
                    osc.stop(time + 0.25);
                };

                const now = this.ctx.currentTime;
                playBeat(now);
                playBeat(now + 0.22); // Double beat
            }
            playSparkle() {
                this.init();
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C Major Arpeggio (Chimes)
                notes.forEach((freq, index) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + index * 0.08);
                    gain.gain.setValueAtTime(0.15, now + index * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.3);
                    osc.start(now + index * 0.08);
                    osc.stop(now + index * 0.08 + 0.35);
                });
            }
            playDramaticBoom() {
                this.init();
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                // Sub-Bass Boom
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 1.2);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                
                // Noise element for impact
                let bufferSize = this.ctx.sampleRate * 1.5;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                let noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                let noiseFilter = this.ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.setValueAtTime(200, now);
                noiseFilter.Q.setValueAtTime(5, now);
                let noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.3, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);

                osc.start(now);
                osc.stop(now + 1.5);
                noise.start(now);
                noise.stop(now + 1.5);
            }
        }

        // Find teamId for a character at a specific episode snapshot (historical memory)
        const getTeamIdAtEp = (char, episode) => {
            if (episode && episode.teamSnapshot) {

                return snap ? snap.teamId : char.teamId;

        // --- AUTOSAVE SYSTEM ---

        function saveState() {
            if (window._isResetting) return; // Non salvare durante il processo di reset

        }

        function loadState() {
            const saved = localStorage.getItem('totalDramaState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.phase = parsed.phase || state.phase;
                    if(parsed.config) state.config = { ...state.config, ...parsed.config };
                    if(parsed.teams) state.teams = parsed.teams;
                    if(parsed.characters) state.characters = parsed.characters;
                    if(parsed.episodes) state.episodes = parsed.episodes;
                    if(parsed.builder) state.builder = { ...state.builder, ...parsed.builder };
                    if(parsed.player) state.player = { ...state.player, ...parsed.player };
                } catch(e) { console.error("Could not load state", e); }
            }

                </div>
            `);
        }

        function executeResetState() {
            window._isResetting = true;
            localStorage.removeItem('totalDramaState');
            window.removeEventListener('beforeunload', saveState);
            if (autoSaveInterval) clearInterval(autoSaveInterval);
            location.reload();

        // --- STREAMING_CHUNK: Integrating Firestore Cloud Storage backend... ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'total-drama-simulator';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        let db = null;
        let auth = null;
        let currentUser = null;
        let isFirebaseActive = false;

        async function initFirebase() {
            if (!firebaseConfig) {
                console.log("Firebase config not available. Falling back to local slot engine.");
                return;
            }
            try {
                const appInstance = initializeApp(firebaseConfig);
                db = getFirestore(appInstance);
                auth = getAuth(appInstance);
                
                if (initialAuthToken) {
                    const userCredential = await signInWithCustomToken(auth, initialAuthToken);
                    currentUser = userCredential.user;
                } else {
                    const userCredential = await signInAnonymously(auth);
                    currentUser = userCredential.user;
                }
                isFirebaseActive = true;
                console.log("Firebase Auth & Firestore loaded successfully. UID:", currentUser.uid);
            } catch (e) {
                console.error("Firebase auth initialization failed:", e);
            }
        }

        // --- STREAMING_CHUNK: Defining Season Manager Database logic... ---
        const SeasonStorage = {
            async listSeasons() {
                if (isFirebaseActive && currentUser) {
                    try {
                        // Public shared saves
                        const publicRef = collection(db, 'artifacts', appId, 'public', 'data', 'seasons');
                        const publicSnap = await getDocs(publicRef);
                        const publicList = publicSnap.docs.map(doc => ({ id: doc.id, ...doc.data(), isPublic: true }));
                        
                        // User-specific private saves
                        const privateRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'seasons');
                        const privateSnap = await getDocs(privateRef);
                        const privateList = privateSnap.docs.map(doc => ({ id: doc.id, ...doc.data(), isPublic: false }));
                        
                        return [...privateList, ...publicList];
                    } catch (e) {
                        console.error("Failed to query Firestore database. Falling back to LocalStorage catalog:", e);
                    }
                }
                const localData = localStorage.getItem('td_saved_seasons');
                return localData ? JSON.parse(localData) : [];
            },
            
            async saveSeason(name, isPublic) {
                const seasonData = {
                    name: name,
                    createdAt: new Date().toISOString(),
                    config: state.config,
                    teams: state.teams,
                    characters: state.characters,
                    episodes: state.episodes,
                    builder: state.builder,
                    player: state.player,
                    phase: state.phase
                };
                
                if (isFirebaseActive && currentUser) {
                    try {
                        if (isPublic) {
                            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'seasons');
                            await addDoc(ref, { ...seasonData, ownerId: currentUser.uid });
                        } else {
                            const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'seasons');
                            await addDoc(ref, seasonData);
                        }
                        return true;
                    } catch (e) {
                        console.error("Failed to post record in Firestore, falling back locally:", e);
                    }
                }
                
                // Fallback storage
                const localData = localStorage.getItem('td_saved_seasons');
                const list = localData ? JSON.parse(localData) : [];
                list.push({ id: 'local_' + Date.now(), isLocal: true, isPublic: false, ...seasonData });
                localStorage.setItem('td_saved_seasons', JSON.stringify(list));
                return true;
            },
            
            async deleteSeason(id, isPublic) {
                if (isFirebaseActive && currentUser && !id.startsWith('local_')) {
                    try {
                        if (isPublic) {
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'seasons', id);
                            await deleteDoc(docRef);
                        } else {
                            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'seasons', id);
                            await deleteDoc(docRef);
                        }
                        return true;
                    } catch (e) {
                        console.error("Firestore record deletion failed:", e);
                    }
                }
                
                const localData = localStorage.getItem('td_saved_seasons');
                if (localData) {
                    let list = JSON.parse(localData);
                    list = list.filter(item => item.id !== id);
                    localStorage.setItem('td_saved_seasons', JSON.stringify(list));
                }
                return true;
            }
        };

            } catch (err) {
                console.error("Save Manager rendering error:", err);
                customAlert("Failed to load your save index. Please refresh the page.");
            }
        }

        async function saveCurrentSeason() {
            const input = document.getElementById('seasonSaveName');
            const isPublicBox = document.getElementById('seasonSavePublic');
            if(!input) return;
            const name = input.value.trim();
            if(!name) {
                customAlert("Please enter a valid season save name first!");
                return;
            }
            const isPublic = isPublicBox ? isPublicBox.checked : false;

            const success = await SeasonStorage.saveSeason(name, isPublic);
            if (success) {
                sound.playSparkle();
                openSeasonManager();
            }
        }

        async function loadSeason(id, isPublic) {
            customConfirm(
                "📂 OVERWRITE CURRENT GAME?", 
                "Loading this season will replace your active simulator screen. Any unsaved edits on the active setup will be lost! Continue?", 
                async () => {
                    try {
                        const list = await SeasonStorage.listSeasons();
                        const record = list.find(s => s.id === id);
                        if (record) {
                            state.config = { ...state.config, ...record.config };
                            state.teams = record.teams;
                            state.characters = record.characters;
                            state.episodes = record.episodes;
                            state.builder = { ...state.builder, ...record.builder };
                            state.player = { ...state.player, ...record.player };
                            state.phase = record.phase || 'setup';

                            saveState();
                            sound.playSparkle();
                            hideModal();
                            render();
                        } else {
                            customAlert("Could not find the season save record.");
                        }
                    } catch (e) {
                        console.error("Error loading season:", e);
                        customAlert("An error occurred while loading this save.");
                    }
                }
            );
        }

        async function deleteSeason(id, isPublic) {
            customConfirm(
                "🗑️ DELETE SEASON SAVE?", 
                "Are you absolutely sure you want to delete this save file? This operation cannot be undone!", 
                async () => {
                    const success = await SeasonStorage.deleteSeason(id, isPublic);
                    if (success) {
                        openSeasonManager();
                    }
                }
            );
        }

        // --- STREAMING_CHUNK: Setting up Page Phase controls... ---
        function changePhase(newPhase) {
            state.phase = newPhase;
            if (state.player.ceremonyTimer) clearInterval(state.player.ceremonyTimer);
            if (state.player.activeHeartbeat) clearInterval(state.player.activeHeartbeat);
            render();
        }

        function render() {
            switch(state.phase) {
                case 'intro': renderIntro(); break;
                case 'setup': renderSetup(); break;
                case 'builder': renderVisualBuilder(); break;
                case 'presentation': renderPresentationPlayer(); break;
                case 'standings': renderStandings(); break;
            }
        }

        // Global Modals
        function showModal(htmlContent) {
            modalContent.innerHTML = htmlContent;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }
        function hideModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

            showModal(`

                <p class="mb-6 text-center text-gray-300 font-semibold">${msg}</p>
                <div class="flex justify-center"><button onclick="hideModal()" class="bg-amber-600 hover:bg-amber-500 text-white px-8 py-2 rounded-lg font-bold">Got it!</button></div>
            `);
        }

                    <p class="text-md text-gray-200 mb-8 font-medium leading-relaxed">Create and simulate your custom show. Organize teams, set immunity, and decide the votes. Enjoy an immersive presentation full of suspense, heartbeats, and spectacular campfires!</p>
                    
                    <div class="flex flex-col gap-4 max-w-md mx-auto items-center justify-center">

                    ${hasSavedData ? `<div class="mt-8"><button onclick="confirmResetState()" class="text-red-400 hover:text-red-300 text-sm font-bold border border-red-500/30 hover:border-red-500 px-4 py-2 rounded-full transition bg-gray-900/50 shadow">🗑️ Delete Save & Start Over</button></div>` : ''}

        // --- PRESET SYSTEM HELPERS ---
        function renderPresetsGrid() {
            const grid = document.getElementById('presetsGrid');
            if (!grid) return;
            const activeNames = state.characters.map(c => c.name.toLowerCase());
            const searchInput = document.getElementById('presetSearch');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            const filtered = PRESETS.filter(p => p.name.toLowerCase().includes(searchTerm));

            grid.innerHTML = filtered.map(p => {
                const inCast = activeNames.includes(p.name.toLowerCase());
                const borderStyle = inCast ? 'border-green-500/80 opacity-50 bg-green-950/10' : 'border-gray-800 hover:border-yellow-500 hover:scale-105 bg-gray-900';
                const badgeStyle = inCast ? 'bg-green-600 text-white' : 'bg-yellow-500 text-black';
                const badgeText = inCast ? '✓' : '+';
                const action = inCast ? '' : `onclick="addPresetCharacter('${p.name.replace(/'/g, "\\'")}', '${p.img}')"`;

                return `
                    <div ${action} class="flex flex-col items-center group cursor-pointer relative p-1.5 rounded-xl border transition ${borderStyle}" title="${p.name}">
                        <div class="absolute -top-1.5 -right-1.5 ${badgeStyle} text-[8px] font-black rounded-full w-4 h-4 flex items-center justify-center shadow z-10">
                            ${badgeText}
                        </div>
                        <img src="${p.img}" class="w-10 h-10 ${state.config.avatarShape} object-cover">
                        <span class="text-[9px] font-bold mt-1 text-center truncate w-full text-gray-300">${p.name}</span>
                    </div>
                `;
            }).join('');
        }

        function filterPresets(term) {
            renderPresetsGrid();
        }

        function addPresetCharacter(name, img) {
            if (state.characters.some(c => c.name.toLowerCase() === name.toLowerCase())) {
                customAlert(`${name} is already in your cast!`);
                return;
            }
            const teamId = document.getElementById('charTeam') ? document.getElementById('charTeam').value : null;
            state.characters.push({
                id: generateId(),
                name,
                img,
                teamId: teamId || null,
                status: 'active',
                placement: null
            });
            saveState();
            
            // Safe scroll tracking to lock scroll positions
            const presetGrid = document.getElementById('presetsGrid');
            const scrollPreset = presetGrid ? presetGrid.scrollTop : 0;
            const castContainer = document.getElementById('castContainer');
            const scrollCast = castContainer ? castContainer.scrollTop : 0;

            renderSetup();

            // Re-apply preserved scroll points
            const newPresetGrid = document.getElementById('presetsGrid');
            if (newPresetGrid) newPresetGrid.scrollTop = scrollPreset;
            const newCastContainer = document.getElementById('castContainer');
            if (newCastContainer) newCastContainer.scrollTop = scrollCast;
        }

        function addTeam() {
            const name = document.getElementById('teamName').value.trim();
            const color = document.getElementById('teamColor').value;
            if(!name) return;
            state.teams.push({ id: generateId(), name, color });
            renderSetup();
        }
        function removeTeam(id) {
            state.teams = state.teams.filter(t => t.id !== id);
            state.characters.forEach(c => { if(c.teamId === id) c.teamId = null; });
            renderSetup();
        }
        function addCharacter() {
            const name = document.getElementById('charName').value.trim();
            const teamId = document.getElementById('charTeam').value;
            let img = document.getElementById('charImg').value.trim();
            if(!name) return;
            if(!img) img = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=334155&color=fff&size=150&bold=true`;
            state.characters.push({ id: generateId(), name, img, teamId: teamId || null, status: 'active', placement: null });
            renderSetup();
        }
        function removeCharacter(id) {
            state.characters = state.characters.filter(c => c.id !== id);
            renderSetup();
        }
        function openTeamAssignModal(charId) {
            const char = getChar(charId);
            const teamOptions = state.teams.map(t => `
                <button onclick="assignTeam('${charId}', '${t.id}')" class="w-full text-center px-4 py-3 rounded-xl text-white font-bold mb-2 hover:opacity-90 transition shadow" style="background-color: ${t.color}">
                    Assign to: ${t.name}
                </button>
            `).join('');
            
            showModal(`
                <h3 class="text-xl font-bold mb-4 text-center">Edit Team for ${char.name}</h3>
                <div class="flex justify-center mb-6"><img src="${char.img}" class="w-20 h-20 ${state.config.avatarShape} border-4 border-gray-700"></div>
                <div class="max-h-64 overflow-y-auto custom-scroll mb-4 pr-1">

            `);
        }
        function assignTeam(charId, teamId) {
            const char = getChar(charId);
            char.teamId = teamId;
            hideModal();
            renderSetup();
        }

        function resetBuilderTemp() {
            state.builder.losingTeamId = null;
            state.builder.immuneId = null;
            state.builder.votes = [];
            state.builder.safeOrder = [];
            state.builder.eliminatedId = null;
            state.builder.eliminationReason = '';
            state.builder.finaleType = null;
            state.builder.winnerId = null;

        function startVisualBuilder() {
            if(getActiveChars().length < 2) return customAlert("You must add at least 2 contestants to start!");
            
            state.builder.currentEpNum = state.episodes.length + 1;
            state.builder.step = 0;
            state.builder.activeCastCache = getActiveChars();
            resetBuilderTemp();
            state.builder.isFinale = (state.builder.activeCastCache.length === 2);
            
            changePhase('builder');
        }

        // --- STREAMING_CHUNK: Setting up visual builder screen and canvas... ---
        function renderVisualBuilder() {
            header.classList.add('hidden');
            const bgUrl = state.builder.step === 3 ? state.config.bgElimination : state.config.bgMain;
            body.style.backgroundImage = `linear-gradient(rgba(15,23,42,0.7), rgba(15,23,42,0.85)), url('${bgUrl}')`;
            body.style.backgroundSize = 'cover';
            body.style.backgroundPosition = 'center';

            app.innerHTML = `
                <div class="flex flex-col w-full h-[90vh] max-w-6xl mx-auto rounded-3xl overflow-hidden shadow-2xl bg-gray-950/90 border border-gray-800 relative animate-fadeIn">
                    
                    <!-- Top Info bar -->
                    <div class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center z-20 border-b border-gray-800">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl td-font text-yellow-400">${state.config.seasonTitle} <span class="text-gray-400 text-xl mx-1">|</span> Episode ${state.builder.currentEpNum}</span>

                        <div class="flex gap-2">
                            <button onclick="changePhase('intro')" class="bg-gray-800 hover:bg-gray-750 text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-gray-700 transition">🏠 Home</button>
                            <button onclick="openSeasonManager()" class="bg-amber-800 hover:bg-amber-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-amber-900 transition flex items-center gap-1">💾 Save/Saves</button>
                            ${state.episodes.length > 0 && state.builder.step === 0 ? `<button onclick="undoLastEpisode()" class="text-red-400 hover:text-red-300 text-xs px-3 py-1 border border-red-500/40 hover:border-red-500 rounded-lg">Undo Previous Ep</button>` : ''}

                        </div>

                    <div class="bg-gray-900 p-4 px-6 flex justify-between items-center z-20 border-t border-gray-850">

                        </div>
                    </div>

                </div>
            `;

            renderBuilderPreviewArea();
        }

        // --- STREAMING_CHUNK: Generating show structures and layout calculations... ---
        function renderBuilderPreviewArea() {
            const area = document.getElementById('slide-preview-area');
            const instructions = document.getElementById('builder-instructions');

                                iconOverlay = `<div class="absolute inset-0 bg-red-600/20 rounded-full"></div><div class="absolute -bottom-2 bg-red-600 text-white text-[9px] font-black px-2.5 py-0.5 rounded-full shadow">ELIMINATED</div>`;
                            } else if (isSafe) {
                                const order = state.builder.safeOrder.indexOf(c.id) + 1;
                                bgBorder = "border-green-500 bg-green-950/30";
                                iconOverlay = `
                                    <div class="absolute -top-3 -right-3 w-7 h-7 bg-green-600 text-white rounded-full flex items-center justify-center font-bold text-xs border border-white shadow">${order}</div>
                                    <div class="absolute -bottom-2 bg-green-500 text-black text-[9px] font-black px-2 py-0.5 rounded-full shadow">SAFE</div>
                                `;
                            }

                            return `
                            <div ${!state.builder.eliminatedId ? `onclick="handleCeremonyClick('${c.id}')"` : ''} class="bg-gray-900/60 p-4 rounded-2xl border-2 transition transform hover:scale-105 flex flex-col items-center w-28 relative ${bgBorder}">
                                ${votesText}
                                <div class="relative">
                                    <img src="${c.img}" class="w-16 h-16 ${state.config.avatarShape}">
                                    ${iconOverlay}
                                </div>
                                <span class="text-white text-xs font-bold mt-3">${c.name}</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                    
                    ${state.builder.eliminatedId ? `
                        <div class="w-full max-w-2xl z-30 slide-up bg-gray-950/95 border border-red-900/50 p-4 rounded-2xl shadow-2xl mt-8">
                            <label class="block text-red-400 font-bold text-[10px] mb-2 uppercase tracking-widest">Reason for Elimination (Appears at the end of the episode)</label>
                            <textarea oninput="state.builder.eliminationReason = this.value" class="w-full bg-gray-900 border border-gray-800 rounded-lg p-3 text-gray-200 text-sm focus:border-red-500 focus:outline-none transition resize-none custom-scroll" rows="2" placeholder="e.g. They cost the team the challenge...">${state.builder.eliminationReason || ''}</textarea>
                        </div>
                    ` : ''}
                `;
            }
        }

        // --- STREAMING_CHUNK: Setting up navigation triggers inside visual editor... ---
        function builderSetStep(step) { state.builder.step = step; renderBuilderPreviewArea(); }
        function builderNextStep() { state.builder.step++; renderBuilderPreviewArea(); }
        function selectLosingTeam(id) { state.builder.losingTeamId = id; resetBuilderSetupOnMod(); renderBuilderPreviewArea(); }
        function selectImmunity(id) { state.builder.immuneId = id; resetBuilderSetupOnMod(); renderBuilderPreviewArea(); }
        function resetBuilderSetupOnMod() { state.builder.votes = []; state.builder.safeOrder = []; state.builder.eliminatedId = null; }
        
        // FINALE HELPER FUNCTIONS
        function setFinaleType(type) { state.builder.finaleType = type; renderBuilderPreviewArea(); }
        function selectWinner(id) { state.builder.winnerId = id; renderBuilderPreviewArea(); }
        function openFinaleVoteOverlay(voterId) {
            const voter = getChar(voterId);
            const final2 = state.builder.activeCastCache;

            showModal(`
                <h3 class="text-xl font-bold text-center mb-4 text-purple-300">Who is ${voter.name} voting to WIN?</h3>
                <div class="flex justify-center gap-6 bg-gray-950 p-6 rounded-xl border border-gray-800">
                    ${final2.map(c => `
                        <button onclick="addVoteBuilder('${voterId}', '${c.id}')" class="flex flex-col items-center bg-gray-900 hover:bg-gray-850 p-4 rounded-xl border-2 border-gray-800 hover:border-yellow-500 transition w-28 transform hover:scale-105">
                            <img src="${c.img}" class="w-16 h-16 ${state.config.avatarShape}">
                            <span class="text-xs text-white td-font mt-2 truncate w-full text-center">${c.name}</span>
                        </button>
                    `).join('')}
                </div>
                <button onclick="hideModal()" class="w-full mt-4 bg-gray-900 border border-gray-850 text-gray-400 py-2 rounded-xl hover:text-white transition">Cancel</button>
            `);
        }
        function handleFinaleJuryNext() {
            if (state.builder.votes.length === 0) {
                return customAlert("You must record at least 1 jury vote, or change the finale format to Direct Choice.");
            }
            const tallies = {};
            state.builder.activeCastCache.forEach(c => tallies[c.id] = 0);
            state.builder.votes.forEach(v => { tallies[v.votedId] = (tallies[v.votedId] || 0) + 1; });
            
            let maxVotes = 0;
            for(let id in tallies) { if(tallies[id] > maxVotes) maxVotes = tallies[id]; }
            const tiedIds = Object.keys(tallies).filter(id => tallies[id] === maxVotes);

            if (tiedIds.length === 1) {
                state.builder.winnerId = tiedIds[0];
                builderSetStep(3);
            } else {
                const charsHtml = tiedIds.map(id => {
                    const c = getChar(id);
                    return `
                        <button onclick="resolveFinaleTie('${id}')" class="flex flex-col items-center p-4 bg-gray-900 hover:bg-gray-850 rounded-xl border border-gray-800 hover:border-yellow-500 transition w-32">
                            <img src="${c.img}" class="w-16 h-16 ${state.config.avatarShape}">
                            <span class="text-sm font-bold text-white mt-2 truncate w-full text-center">${c.name}</span>
                            <span class="text-xs text-yellow-500 font-black mt-1">${maxVotes} Votes</span>
                        </button>
                    `;
                }).join('');

                showModal(`
                    <h3 class="text-3xl font-black text-center text-yellow-500 td-font mb-2">⚖️ JURY TIE!</h3>
                    <p class="text-gray-300 text-sm text-center mb-6">The jury is perfectly split. As the host, you must break the tie and crown the winner:</p>
                    <div class="flex justify-center gap-6 flex-wrap mb-6">
                        ${charsHtml}
                    </div>
                    <button onclick="hideModal()" class="w-full bg-gray-950 border border-gray-800 text-gray-500 py-2 rounded-xl">Cancel</button>
                `);
            }
        }
        function resolveFinaleTie(winnerId) {
            state.builder.winnerId = winnerId;
            hideModal();
            builderSetStep(3);
        }

        function triggerMergeBuilder() {
            state.builder.isMerge = true;
            state.builder.losingTeamId = null;
            
            const div = document.createElement('div');
            div.className = "fixed top-8 left-1/2 transform -translate-x-1/2 bg-purple-600 text-white font-bold px-8 py-4 rounded-2xl shadow-2xl z-50 text-lg border border-purple-400 slide-up td-font tracking-wider";
            div.innerText = "💥 TEAMS ARE DISBANDED! IT'S NOW INDIVIDUAL PHASE!";
            document.body.appendChild(div);
            sound.playDramaticBoom();
            setTimeout(() => { div.remove(); }, 3000);
            renderBuilderPreviewArea();
        }

        function openVoteOverlay(voterId) {
            const voter = getChar(voterId);
            let eligibleVoted = state.builder.isMerge ? state.builder.activeCastCache : state.builder.activeCastCache.filter(c => c.teamId === state.builder.losingTeamId);
            if (state.builder.immuneId) {
                eligibleVoted = eligibleVoted.filter(c => c.id !== state.builder.immuneId);
            }

            showModal(`
                <h3 class="text-xl font-bold text-center mb-4 text-white">Who is ${voter.name} voting for?</h3>
                <div class="grid grid-cols-4 gap-3 bg-gray-950 p-4 rounded-xl border border-gray-800 max-h-60 overflow-y-auto custom-scroll">
                    ${eligibleVoted.filter(c => c.id !== voterId).map(c => `
                        <button onclick="addVoteBuilder('${voterId}', '${c.id}')" class="flex flex-col items-center bg-gray-900 hover:bg-gray-855 p-2 rounded-lg border border-gray-800 hover:border-yellow-500 transition">
                            <img src="${c.img}" class="w-10 h-10 ${state.config.avatarShape}">
                            <span class="text-[9px] text-gray-300 font-bold mt-1.5 truncate w-full text-center">${c.name}</span>
                        </button>
                    `).join('')}
                </div>
                <button onclick="hideModal()" class="w-full mt-4 bg-gray-900 border border-gray-800 text-gray-400 py-2 rounded-xl">Cancel</button>
            `);
        }

        function addVoteBuilder(voterId, votedId) {
            state.builder.votes = state.builder.votes.filter(v => v.voterId !== voterId);
            state.builder.votes.push({ voterId, votedId });
            hideModal();
            renderBuilderPreviewArea();
        }
        function removeVoteBuilder(index) {
            state.builder.votes.splice(index, 1);
            renderBuilderPreviewArea();
        }

        function generateAutoSafeOrder(eliminatedId) {
            let eligibleChars = state.builder.isMerge ? state.builder.activeCastCache : state.builder.activeCastCache.filter(c => c.teamId === state.builder.losingTeamId);
            
            const tallies = {};
            eligibleChars.forEach(c => tallies[c.id] = 0);
            state.builder.votes.forEach(v => {
                if(tallies[v.votedId] !== undefined) tallies[v.votedId]++;
            });

            let safeChars = eligibleChars.filter(c => c.id !== eliminatedId);
            safeChars = safeChars.sort(() => Math.random() - 0.5);

            if (state.builder.votes.length > 0) {
                let maxSafeVotes = -1;
                let bottomTwoCandidate = null;

                safeChars.forEach(c => {
                    if (tallies[c.id] > maxSafeVotes) {
                        maxSafeVotes = tallies[c.id];
                        bottomTwoCandidate = c;
                    }
                });

                if (bottomTwoCandidate && maxSafeVotes > 0) {
                    safeChars = safeChars.filter(c => c.id !== bottomTwoCandidate.id);
                    safeChars.push(bottomTwoCandidate);
                }
            }

            state.builder.safeOrder = safeChars.map(c => c.id);
        }

        function handleVoteNext() {
            if (state.builder.votes.length === 0) {
                state.builder.eliminatedId = null;
                state.builder.safeOrder = [];
                builderNextStep();
                return;
            }
            
            const tallies = {};
            let eligibleChars = state.builder.isMerge ? state.builder.activeCastCache : state.builder.activeCastCache.filter(c => c.teamId === state.builder.losingTeamId);
            eligibleChars.forEach(c => tallies[c.id] = 0);

            state.builder.votes.forEach(v => { tallies[v.votedId] = (tallies[v.votedId] || 0) + 1; });
            let maxVotes = 0;
            for(let id in tallies) { if(tallies[id] > maxVotes) maxVotes = tallies[id]; }
            const tiedIds = Object.keys(tallies).filter(id => tallies[id] === maxVotes);

            if (tiedIds.length === 1) {
                state.builder.eliminatedId = tiedIds[0];
                generateAutoSafeOrder(tiedIds[0]);
                builderSetStep(3);
            } else {
                const charsHtml = tiedIds.map(id => {
                    const c = getChar(id);
                    return `
                        <button onclick="resolveTieBuilder('${id}')" class="flex flex-col items-center p-3 bg-gray-900 hover:bg-gray-855 rounded-xl border border-gray-800 hover:border-red-500 transition w-24">
                            <img src="${c.img}" class="w-12 h-12 ${state.config.avatarShape}">
                            <span class="text-xs font-bold text-white mt-2 truncate w-full text-center">${c.name}</span>
                            <span class="text-[10px] text-red-500 font-black mt-1">${maxVotes} Votes</span>
                        </button>
                    `;
                }).join('');

                showModal(`
                    <h3 class="text-2xl font-black text-center text-red-500 td-font mb-2">💥 TIE!</h3>
                    <p class="text-gray-300 text-xs text-center mb-6">Multiple contestants received the same number of votes. Break the tie by deciding the final eliminated:</p>
                    <div class="flex justify-center gap-3 flex-wrap mb-6">
                        ${charsHtml}
                    </div>
                    <button onclick="hideModal()" class="w-full bg-gray-950 border border-gray-800 text-gray-500 py-2 rounded-xl">Cancel and recalculate</button>
                `);
            }
        }

        function resolveTieBuilder(eliminatedId) {
            state.builder.eliminatedId = eliminatedId;
            hideModal();
            generateAutoSafeOrder(eliminatedId);
            builderSetStep(3);
        }

        function handleCeremonyClick(charId) {
            if (!state.builder.eliminatedId) {
                state.builder.eliminatedId = charId;
                generateAutoSafeOrder(charId);
                renderBuilderPreviewArea();
            }
        }

        function undoEliminatedBuilder() {
            state.builder.eliminatedId = null;
            state.builder.safeOrder = [];
            renderBuilderPreviewArea();
        }

        function saveVisualEpisode() {
            const charObj = getChar(state.builder.eliminatedId);
            charObj.status = 'eliminated';
            charObj.placement = state.builder.activeCastCache.length;

            state.episodes.push({
                num: state.builder.currentEpNum,
                isMerge: state.builder.isMerge,
                losingTeamId: state.builder.losingTeamId,
                immuneId: state.builder.immuneId,
                votes: [...state.builder.votes],
                safeOrder: [...state.builder.safeOrder],
                eliminatedId: state.builder.eliminatedId,
                eliminationReason: state.builder.eliminationReason || "Voted out by the cast.",
                placement: state.builder.activeCastCache.length,
                teamSnapshot: state.characters.map(c => ({ id: c.id, teamId: c.teamId })) // Snapshot delle squadre
            });

            state.builder.currentEpNum++;
            state.builder.step = 0;
            state.builder.activeCastCache = getActiveChars();
            state.builder.isFinale = (state.builder.activeCastCache.length === 2);
            
            resetBuilderTemp();
            
            if (state.builder.activeCastCache.length <= 1) {
                finishBuilding();
            } else {
                renderVisualBuilder();
            }
        }

        function saveVisualFinale() {
            const winner = getChar(state.builder.winnerId);
            const runnerUp = state.builder.activeCastCache.find(c => c.id !== state.builder.winnerId);
            
            runnerUp.status = 'eliminated';
            runnerUp.placement = 2;
            winner.placement = 1;

            state.episodes.push({
                num: state.builder.currentEpNum,
                isFinale: true,
                finaleType: state.builder.finaleType,
                winnerId: state.builder.winnerId,
                runnerUpId: runnerUp.id,
                votes: [...state.builder.votes],
                eliminationReason: "Runner-up of the season!",
                teamSnapshot: state.characters.map(c => ({ id: c.id, teamId: c.teamId })) // Snapshot delle squadre per la finale
            });

            state.builder.currentEpNum++;
            state.builder.step = 0;
            state.builder.activeCastCache = getActiveChars();
            resetBuilderTemp();
            
            finishBuilding();
        }

        function undoLastEpisode() {
            if (state.episodes.length === 0) return;
            const lastEp = state.episodes.pop();
            
            if (lastEp.isFinale) {
                const runnerUp = getChar(lastEp.runnerUpId);
                const winner = getChar(lastEp.winnerId);
                runnerUp.status = 'active';
                runnerUp.placement = null;
                winner.placement = null;
            } else {
                const charObj = getChar(lastEp.eliminatedId);
                charObj.status = 'active';
                charObj.placement = null;
            }

            if(lastEp.isMerge && (state.episodes.length === 0 || !state.episodes[state.episodes.length - 1].isMerge)) {
                 state.builder.isMerge = false;
                 customAlert("You undid a Merge episode. Remember to recheck if characters are correctly assigned to their original teams!");
            }

            state.builder.currentEpNum--;
            state.builder.step = 0;
            state.builder.activeCastCache = getActiveChars();
            resetBuilderTemp();
            state.builder.isFinale = (state.builder.activeCastCache.length === 2);
            renderVisualBuilder();
        }

        function finishBuilding() {
            generatePresentationSlides();
            changePhase('presentation');
        }

        // --- STREAMING_CHUNK: Setting up slides layout generation... ---
        function generatePresentationSlides() {
            state.player.slides = [];
            
            for (let i = 0; i < state.episodes.length; i++) {
                const ep = state.episodes[i];
                
                if (ep.isFinale) {
                    state.player.slides.push({ type: 'FINALE_TITLE', data: ep });
                    if (ep.finaleType === 'jury' && ep.votes && ep.votes.length > 0) {
                        state.player.slides.push({ type: 'FINALE_JURY_VOTES', data: ep });
                    }
                    state.player.slides.push({ type: 'FINALE_SUSPENSE', data: ep });
                    state.player.slides.push({ type: 'FINALE_WINNER_REVEAL', data: ep });
                    continue;
                }

                state.player.slides.push({ type: 'TITLE', data: ep });
                
                const prevEp = i > 0 ? state.episodes[i - 1] : null;
                state.player.slides.push({ type: 'OVERVIEW', data: ep, prevEliminatedId: prevEp ? prevEp.eliminatedId : null });
                
                if (!ep.isMerge && ep.losingTeamId) {
                    state.player.slides.push({ type: 'LOSING_TEAM', data: ep });
                } else if (ep.isMerge && ep.immuneId) {
                    state.player.slides.push({ type: 'IMMUNITY', data: ep });
                }

                state.player.slides.push({ type: 'CEREMONY', data: ep });

                if (ep.votes && ep.votes.length > 0) {
                    state.player.slides.push({ type: 'VOTES', data: ep });
                }

                state.player.slides.push({ type: 'ELIMINATION_REVEAL', data: ep });
            }

            state.player.slides.push({ type: 'END_SEASON' });
            state.player.currentIndex = 0;
        }

        // --- STREAMING_CHUNK: Setting up Cinematic Player screen... ---
        function renderPresentationPlayer() {
            header.classList.add('hidden');
            body.style.backgroundImage = 'none';
            body.style.backgroundColor = '#020617';

            app.innerHTML = `
                <div class="flex w-full h-[95vh] max-w-7xl mx-auto rounded-3xl overflow-hidden shadow-2xl bg-gray-950 border border-gray-850 relative animate-fadeIn">
                    <!-- CENTRAL PRESENTATION AREA (DRAMA STAGE) -->
                    <div class="w-full flex flex-col justify-between relative bg-black">
                        
                        <!-- Main Screen -->
                        <div id="player-screen" class="flex-grow relative overflow-hidden bg-cover bg-center flex items-center justify-center transition-all duration-700"></div>
                        
                        <!-- Bottom Control Bar -->
                        <div class="bg-gray-900/90 px-6 py-4 flex justify-between items-center z-20 border-t border-gray-850">
                            <button onclick="playerPrev()" class="bg-gray-800 hover:bg-gray-755 text-white px-5 py-2.5 rounded-xl font-bold text-xs transition">◀ Previous</button>
                            
                            <div class="flex items-center gap-3">
                                <span class="text-xs text-gray-400 font-semibold" id="slide-progress">Slide 1 / 1</span>
                                <button onclick="openSeasonManager()" class="bg-amber-800 hover:bg-amber-700 text-white text-xs px-4 py-2.5 rounded-xl font-bold shadow border border-amber-900 flex items-center gap-1">💾 Save Season</button>
                                <button onclick="changePhase('builder')" class="bg-gray-850 hover:bg-gray-800 text-yellow-500 border border-gray-700 text-xs px-4 py-2.5 rounded-xl font-bold">Modify Show</button>
                                <button onclick="changePhase('standings')" class="bg-yellow-600 hover:bg-yellow-500 text-white text-xs px-5 py-2.5 rounded-xl font-bold shadow">Final Standings 🏆</button>
                            </div>

                            <button onclick="playerNext()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-2.5 rounded-xl font-bold text-xs transition">Next ▶</button>
                        </div>

                    </div>
                </div>
            `;
            renderCurrentSlide();
        }

        function playerNext() {
            if (state.player.ceremonyTimer) clearInterval(state.player.ceremonyTimer);
            if (state.player.activeHeartbeat) clearInterval(state.player.activeHeartbeat);
            
            if (state.player.currentIndex < state.player.slides.length - 1) {
                state.player.currentIndex++;
                renderCurrentSlide();
            } else {
                changePhase('standings');
            }
        }
        
        function playerPrev() {
            if (state.player.ceremonyTimer) clearInterval(state.player.ceremonyTimer);
            if (state.player.activeHeartbeat) clearInterval(state.player.activeHeartbeat);
            
            if (state.player.currentIndex > 0) {
                state.player.currentIndex--;
                renderCurrentSlide();
            }
        }

        // --- STREAMING_CHUNK: Processing rendering slides and historical memory snapshots... ---
        async function renderCurrentSlide() {
            const screen = document.getElementById('player-screen');
            const progress = document.getElementById('slide-progress');
            if(!screen) return;
            
            const slide = state.player.slides[state.player.currentIndex];
            
            if (slide && slide.data && slide.data.num) {
                const freshEp = state.episodes.find(e => e.num === slide.data.num);
                if (freshEp) {
                    slide.data = freshEp;
                }
            }
            
            progress.innerText = `Slide ${state.player.currentIndex + 1} of ${state.player.slides.length}`;
            screen.innerHTML = '';

            if (slide.type === 'FINALE_TITLE') {
                screen.style.backgroundImage = `linear-gradient(rgba(15,23,42,0.6), rgba(15,23,42,0.9)), url('${state.config.bgMain}')`;
                const winner = getChar(slide.data.winnerId);
                const runnerUp = getChar(slide.data.runnerUpId);
                
                screen.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-center p-6 fade-in w-full h-full">
                        <span class="text-yellow-500 font-bold text-sm bg-yellow-500/10 border border-yellow-500/30 px-6 py-2 rounded-full uppercase tracking-widest mb-6 mt-auto animate-pulse">SEASON FINALE</span>
                        <h1 class="text-7xl md:text-8xl text-yellow-400 td-font mb-12 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">THE GRAND FINALE</h1>
                        
                        <div class="flex justify-center items-center gap-8 md:gap-16 mb-auto w-full max-w-4xl">
                            <div class="flex flex-col items-center bg-gray-900/80 p-6 rounded-3xl border border-gray-700 shadow-2xl transform hover:scale-105 transition w-48">
                                <img src="${runnerUp.img}" class="w-24 h-24 ${state.config.avatarShape} border-2 border-gray-500">
                                <span class="text-white text-xl td-font mt-4">${runnerUp.name}</span>
                            </div>
                            <span class="text-5xl text-gray-500 td-font italic">VS</span>
                            <div class="flex flex-col items-center bg-gray-900/80 p-6 rounded-3xl border border-gray-700 shadow-2xl transform hover:scale-105 transition w-48">
                                <img src="${winner.img}" class="w-24 h-24 ${state.config.avatarShape} border-2 border-gray-500">
                                <span class="text-white text-xl td-font mt-4">${winner.name}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'FINALE_JURY_VOTES') {
                screen.style.backgroundImage = `linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.95)), url('${state.config.bgMain}')`;
                screen.innerHTML = `
                    <div class="flex flex-col items-center justify-start p-6 w-full h-full fade-in">
                        <h2 class="text-5xl text-purple-400 td-font mb-2 drop-shadow">THE JURY DECIDES</h2>
                        <p class="text-xs text-gray-400 mb-8 bg-gray-900 border border-gray-800 px-4 py-2 rounded-full">The eliminated campers have cast their votes for the winner.</p>
                        <div id="playback-votes-grid" class="grid grid-cols-2 gap-4 w-full max-w-2xl overflow-y-auto custom-scroll pr-1 pb-10"></div>
                    </div>
                `;

                const container = document.getElementById('playback-votes-grid');
                slide.data.votes.forEach((v, index) => {
                    const voter = getChar(v.voterId);
                    const voted = getChar(v.votedId);
                    
                    const el = document.createElement('div');
                    el.className = "bg-purple-950/40 border border-purple-900/50 p-3 rounded-2xl flex items-center justify-between shadow transition transform hover:scale-102 opacity-0";
                    el.style.animation = `slideUp 0.4s ease-out forwards`;
                    el.style.animationDelay = `${index * 0.15}s`;
                    el.innerHTML = `
                        <div class="flex items-center gap-2">
                            <img src="${voter.img}" class="w-8 h-8 ${state.config.avatarShape} filter grayscale">
                            <span class="text-[11px] font-bold text-gray-300 truncate w-14">${voter.name}</span>
                        </div>
                        <span class="text-[9px] text-yellow-500 font-black">WANTS TO WIN ➔</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] font-bold text-yellow-400 truncate w-14 text-right">${voted.name}</span>
                            <img src="${voted.img}" class="w-8 h-8 ${state.config.avatarShape} border border-yellow-500/50">
                        </div>
                    `;
                    container.appendChild(el);
                    setTimeout(() => el.classList.remove('opacity-0'), index * 150);
                });

            const visualIds = [...atRiskIds].sort((a, b) => originalCastIds.indexOf(a) - originalCastIds.indexOf(b));
            
            state.player.savedList = [];
            
            screen.innerHTML = `
                <!-- Darkness overlay -->
                <div id="ceremony-darkness" class="absolute inset-0 bg-black opacity-0 transition-opacity duration-1000 z-10 pointer-events-none"></div>

        function initFinaleSuspense(ep) {
            const screen = document.getElementById('player-screen');
            screen.style.backgroundImage = `linear-gradient(rgba(15,23,42,0.6), rgba(15,23,42,0.95)), url('${state.config.bgElimination}')`;
            
            const winner = getChar(ep.winnerId);
            const runnerUp = getChar(ep.runnerUpId);
            
            screen.innerHTML = `
                <div id="finale-darkness" class="absolute inset-0 bg-black opacity-0 transition-opacity duration-1000 z-10 pointer-events-none"></div>

                <div class="absolute top-8 w-full text-center z-20">
                    <h2 class="text-5xl text-yellow-400 td-font drop-shadow-md text-3xl">THE FINAL DECISION</h2>
                    <p class="text-sm text-white mt-4 max-w-xl mx-auto bg-black/70 py-2 px-6 rounded-full border border-gray-700 font-semibold" id="finale-speaker">
                        Chris: "It all comes down to this. Only one of you will walk away with the million dollars..."
                    </p>
                </div>

                <div class="absolute inset-0 flex items-center justify-center gap-12 md:gap-24 z-20 mt-16">
                    ${[runnerUp, winner].sort(() => Math.random() - 0.5).map(c => `
                        <div class="flex flex-col items-center relative transition-transform duration-500 scale-110">
                            <div class="absolute -inset-8 bg-yellow-500/0 rounded-full blur-xl transition-all duration-1000 finale-spotlight"></div>
